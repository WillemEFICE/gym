<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#101418">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Training Logboek</title>
<style>
  :root{
    --bg:#101418;
    --card:#1A2027;
    --card-2:#222A33;
    --line:#2C3540;
    --oranje:#FF6B1A;
    --groen:#3DD68C;
    --tekst:#E8ECEF;
    --stil:#8A94A0;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--tekst);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100%}
  body{padding:16px 14px 90px;max-width:520px;margin:0 auto}

  header{margin-bottom:14px}
  .eyebrow{font-weight:700;letter-spacing:.18em;font-size:11px;color:var(--oranje);text-transform:uppercase}
  h1{font-weight:800;font-size:28px;line-height:1.05;text-transform:uppercase;letter-spacing:.01em;margin-top:2px;font-stretch:condensed}
  .datum{color:var(--stil);font-size:13px;margin-top:4px}
  #installKnop{display:none;margin-top:10px;width:100%;background:var(--oranje-dim,rgba(255,107,26,.14));border:1px solid var(--oranje);color:var(--oranje);font-weight:700;font-size:14px;padding:11px;border-radius:10px;cursor:pointer}

  .tabs{display:flex;gap:6px;margin:16px 0 14px;background:var(--card);padding:5px;border-radius:12px}
  .tab{flex:1;border:none;background:transparent;color:var(--stil);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;padding:10px 2px;border-radius:9px;cursor:pointer}
  .tab.actief{background:var(--oranje);color:#141414}

  .oef{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .oef-kop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .oef-naam{font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.01em}
  .oef-doel{font-size:12px;color:var(--stil);white-space:nowrap;font-weight:600}
  .vorige{margin-top:6px;font-size:13px;color:var(--stil)}
  .vorige b{color:var(--tekst);font-weight:600}
  .sets{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .set-rij{display:grid;grid-template-columns:30px 1fr 1fr 34px;gap:8px;align-items:center}
  .set-nr{font-weight:700;font-size:14px;color:var(--stil);text-align:center}
  .veld{position:relative}
  .veld input{width:100%;background:var(--card-2);border:1px solid var(--line);border-radius:9px;color:var(--tekst);font-weight:600;font-size:16px;padding:10px 36px 10px 12px;outline:none}
  .veld input:focus{border-color:var(--oranje)}
  .veld .unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--stil);pointer-events:none}
  .set-x{border:none;background:transparent;color:var(--stil);font-size:18px;cursor:pointer;padding:6px}
  .set-plus{margin-top:9px;width:100%;background:transparent;border:1px dashed var(--line);color:var(--stil);border-radius:9px;padding:9px;font-weight:600;font-size:13px;cursor:pointer}

  .opslaan{position:fixed;bottom:0;left:0;right:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 65%,transparent);max-width:520px;margin:0 auto}
  .opslaan button{width:100%;background:var(--oranje);border:none;color:#141414;font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.06em;padding:15px;border-radius:12px;cursor:pointer}
  .opslaan button:disabled{opacity:.5}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--groen);color:#0d1a12;font-weight:700;font-size:14px;padding:10px 20px;border-radius:99px;transition:transform .3s;z-index:10;white-space:nowrap}
  .toast.zien{transform:translateX(-50%) translateY(0)}

  .hist-item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}
  .hist-kop{display:flex;justify-content:space-between;align-items:center}
  .hist-dag{font-weight:700;font-size:16px;text-transform:uppercase}
  .hist-datum{font-size:13px;color:var(--stil)}
  .hist-body{display:none;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  .hist-item.open .hist-body{display:block}
  .hist-oef{margin-bottom:8px;font-size:14px}
  .hist-oef .n{font-weight:600}
  .hist-oef .s{color:var(--stil)}
  .hist-verwijder{margin-top:8px;background:none;border:none;color:#e05c5c;font-size:13px;font-weight:600;cursor:pointer;padding:4px 0}
  .leeg{text-align:center;color:var(--stil);padding:40px 20px;font-size:15px;line-height:1.5}

  .backup-blok{margin-top:20px;padding:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
  .backup-blok h3{font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .backup-blok p{font-size:13px;color:var(--stil);margin-bottom:10px;line-height:1.4}
  .backup-knoppen{display:flex;gap:8px}
  .backup-knoppen button{flex:1;background:var(--card-2);border:1px solid var(--line);color:var(--tekst);font-weight:600;font-size:13px;padding:10px;border-radius:9px;cursor:pointer}
  #importInput{display:none}
</style>
</head>
<body>
<div class="toast" id="toast">Training opgeslagen ✓</div>
<header>
  <div class="eyebrow">Willem · Ma &amp; Do</div>
  <h1>Training Logboek</h1>
  <div class="datum" id="datumNu"></div>
  <button id="installKnop" onclick="installeerApp()">📲 App installeren op je telefoon</button>
</header>

<div class="tabs">
  <button class="tab actief" data-tab="maandag" onclick="wisselTab('maandag')">Maandag</button>
  <button class="tab" data-tab="donderdag" onclick="wisselTab('donderdag')">Donderdag</button>
  <button class="tab" data-tab="historie" onclick="wisselTab('historie')">Historie</button>
</div>

<div id="inhoud"></div>
<div class="opslaan" id="opslaanBalk"><button id="opslaanKnop" onclick="slaOp()">Training opslaan</button></div>

<script>
const SCHEMA = {
  maandag: {
    oefeningen: [
      {id:"squat", naam:"Squat", doel:"3 × 6–8", sets:3},
      {id:"legcurl", naam:"Seated Leg Curl", doel:"3 × 12", sets:3},
      {id:"incline", naam:"Incline Dumbbell Press", doel:"4 × 8–10", sets:4},
      {id:"crossover", naam:"Cable Crossover", doel:"3 × 10–12", sets:3},
      {id:"csrow", naam:"Chest Supported Row", doel:"4 × 8", sets:4},
      {id:"shpress", naam:"DB Shoulder Press", doel:"3 × 8–10", sets:3},
      {id:"pushdown", naam:"Tricep Pushdown", doel:"3 × 10–12", sets:3}
    ]
  },
  donderdag: {
    oefeningen: [
      {id:"pecdeck", naam:"Pec Deck", doel:"3 × 10", sets:3},
      {id:"vlakpress", naam:"Dumbbell Press (vlak)", doel:"3 × 8–10", sets:3},
      {id:"pulldown", naam:"Lat Pulldown (breed)", doel:"3 × 10", sets:3},
      {id:"cablerow", naam:"Cable Row / 1-Arm Row", doel:"3 × 10", sets:3},
      {id:"lateral", naam:"Lateral Raises", doel:"3 × 12–15", sets:3},
      {id:"facepull", naam:"Face Pull", doel:"3 × 15", sets:3},
      {id:"ezcurl", naam:"EZ-Bar Curl", doel:"3 × 10–12", sets:3},
      {id:"overhead", naam:"Overhead Tricep Ext.", doel:"2 × 12", sets:2}
    ]
  }
};

const OPSLAG_KEY = "willem-gym-sessies";
let sessies = [];
let huidigeTab = "maandag";

const maanden = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
function fmtDatum(iso){
  const d = new Date(iso);
  const dagen = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
  return dagen[d.getDay()] + " " + d.getDate() + " " + maanden[d.getMonth()] + " " + d.getFullYear();
}
document.getElementById("datumNu").textContent = fmtDatum(new Date().toISOString());

function laadSessies(){
  try{
    const r = localStorage.getItem(OPSLAG_KEY);
    if(r) sessies = JSON.parse(r);
  }catch(e){ sessies = []; }
}
function bewaarSessies(){
  localStorage.setItem(OPSLAG_KEY, JSON.stringify(sessies));
}

function laatsteSessie(dag){
  return sessies.filter(s => s.dag === dag).sort((a,b)=> new Date(b.datum)-new Date(a.datum))[0] || null;
}

function vorigeTekst(oefId, dag){
  const vorige = laatsteSessie(dag);
  if(!vorige || !vorige.oefeningen[oefId] || !vorige.oefeningen[oefId].length) return null;
  const sets = vorige.oefeningen[oefId];
  const kgs = [...new Set(sets.map(s=>s.kg))];
  const reps = sets.map(s=>s.reps).join(", ");
  const kgTekst = kgs.length===1 ? kgs[0]+" kg" : sets.map(s=>s.kg+"kg").join("/");
  return {tekst:`<b>${kgTekst}</b> × ${reps}`, sets:sets};
}

function renderDag(dag){
  const schema = SCHEMA[dag];
  let html = "";
  schema.oefeningen.forEach(oef => {
    const vorige = vorigeTekst(oef.id, dag);
    const aantalSets = vorige ? Math.max(oef.sets, vorige.sets.length) : oef.sets;
    let setsHtml = "";
    for(let i=0;i<aantalSets;i++){
      const vKg = vorige && vorige.sets[i] ? vorige.sets[i].kg : "";
      const vReps = vorige && vorige.sets[i] ? vorige.sets[i].reps : "";
      setsHtml += setRij(oef.id, i, vKg, vReps);
    }
    html += `
    <div class="oef" data-oef="${oef.id}">
      <div class="oef-kop">
        <div class="oef-naam">${oef.naam}</div>
        <div class="oef-doel">doel ${oef.doel}</div>
      </div>
      ${vorige ? `<div class="vorige">Vorige keer: ${vorige.tekst}</div>` : `<div class="vorige">Nog geen eerdere sessie — eerste keer!</div>`}
      <div class="sets" id="sets-${oef.id}">${setsHtml}</div>
      <button class="set-plus" onclick="extraSet('${oef.id}')">+ set toevoegen</button>
    </div>`;
  });
  return html;
}

function setRij(oefId, i, kg, reps){
  return `
  <div class="set-rij">
    <div class="set-nr">${i+1}</div>
    <div class="veld"><input type="number" inputmode="decimal" step="0.5" placeholder="${kg!==""?kg:"—"}" data-kg><span class="unit">kg</span></div>
    <div class="veld"><input type="number" inputmode="numeric" placeholder="${reps!==""?reps:"—"}" data-reps><span class="unit">reps</span></div>
    <button class="set-x" onclick="verwijderSet(this)">×</button>
  </div>`;
}

function extraSet(oefId){
  const container = document.getElementById("sets-"+oefId);
  const n = container.children.length;
  container.insertAdjacentHTML("beforeend", setRij(oefId, n, "", ""));
}
function verwijderSet(knop){
  const rij = knop.closest(".set-rij");
  const container = rij.parentElement;
  rij.remove();
  [...container.querySelectorAll(".set-nr")].forEach((el,i)=> el.textContent = i+1);
}

function renderHistorie(){
  let html;
  if(!sessies.length){
    html = `<div class="leeg">Nog geen trainingen opgeslagen.<br>Log je eerste sessie op maandag of donderdag!</div>`;
  } else {
    const gesorteerd = [...sessies].sort((a,b)=> new Date(b.datum)-new Date(a.datum));
    html = gesorteerd.map(s=>{
      const oefHtml = Object.entries(s.oefeningen).map(([id, sets])=>{
        if(!sets.length) return "";
        const alle = Object.values(SCHEMA).flatMap(d=>d.oefeningen);
        const naam = (alle.find(o=>o.id===id)||{naam:id}).naam;
        const setsTekst = sets.map(st=>`${st.kg}kg×${st.reps}`).join("  ·  ");
        return `<div class="hist-oef"><span class="n">${naam}</span><br><span class="s">${setsTekst}</span></div>`;
      }).join("");
      return `
      <div class="hist-item" onclick="this.classList.toggle('open')">
        <div class="hist-kop">
          <div class="hist-dag">${s.dag === "maandag" ? "Maandag" : "Donderdag"}</div>
          <div class="hist-datum">${fmtDatum(s.datum)}</div>
        </div>
        <div class="hist-body">
          ${oefHtml || "<div class='hist-oef s'>Geen sets ingevuld</div>"}
          <button class="hist-verwijder" onclick="event.stopPropagation(); verwijderSessie('${s.datum}')">Verwijder deze sessie</button>
        </div>
      </div>`;
    }).join("");
  }
  html += `
  <div class="backup-blok">
    <h3>Back-up</h3>
    <p>Je data staat in de browser van dit apparaat. Maak af en toe een back-upbestand, dan kun je je historie altijd terugzetten (bijv. op een nieuwe telefoon).</p>
    <div class="backup-knoppen">
      <button onclick="exporteer()">Back-up opslaan</button>
      <button onclick="document.getElementById('importInput').click()">Back-up terugzetten</button>
    </div>
    <input type="file" id="importInput" accept=".json" onchange="importeer(this)">
  </div>`;
  return html;
}

function exporteer(){
  const blob = new Blob([JSON.stringify(sessies, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  a.href = url;
  a.download = `training-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importeer(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error();
      if(!confirm(`Back-up bevat ${data.length} sessies. Terugzetten? Dit vervangt je huidige historie.`)) return;
      sessies = data;
      bewaarSessies();
      toon();
      toastMelding("Back-up teruggezet ✓");
    }catch(e){
      alert("Dit bestand is geen geldige back-up.");
    }
  };
  reader.readAsText(file);
  input.value = "";
}

function verwijderSessie(datum){
  if(!confirm("Deze sessie verwijderen?")) return;
  sessies = sessies.filter(s => s.datum !== datum);
  bewaarSessies();
  toon();
}

function wisselTab(tab){
  huidigeTab = tab;
  document.querySelectorAll(".tab").forEach(b=> b.classList.toggle("actief", b.dataset.tab===tab));
  toon();
}

function toon(){
  const inhoud = document.getElementById("inhoud");
  const balk = document.getElementById("opslaanBalk");
  if(huidigeTab === "historie"){
    inhoud.innerHTML = renderHistorie();
    balk.style.display = "none";
  } else {
    inhoud.innerHTML = renderDag(huidigeTab);
    balk.style.display = "block";
  }
}

function toastMelding(tekst){
  const toast = document.getElementById("toast");
  toast.textContent = tekst;
  toast.classList.add("zien");
  setTimeout(()=> toast.classList.remove("zien"), 2200);
}

function slaOp(){
  const knop = document.getElementById("opslaanKnop");
  const oefeningen = {};
  let ietsIngevuld = false;
  document.querySelectorAll(".oef").forEach(oefEl=>{
    const id = oefEl.dataset.oef;
    const sets = [];
    oefEl.querySelectorAll(".set-rij").forEach(rij=>{
      const kg = rij.querySelector("[data-kg]").value;
      const reps = rij.querySelector("[data-reps]").value;
      if(kg !== "" && reps !== ""){
        sets.push({kg: parseFloat(kg), reps: parseInt(reps)});
        ietsIngevuld = true;
      }
    });
    if(sets.length) oefeningen[id] = sets;
  });
  if(!ietsIngevuld){ alert("Vul eerst minimaal één set in (kg én reps)."); return; }
  try{
    sessies.push({ datum: new Date().toISOString(), dag: huidigeTab, oefeningen });
    bewaarSessies();
    toastMelding("Training opgeslagen ✓");
    setTimeout(()=> toon(), 600);
  }catch(e){
    sessies.pop();
    alert("Opslaan mislukt. Controleer of je browser opslag toestaat.");
  }
}

laadSessies();
toon();

// --- PWA: service worker registreren ---
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

// --- PWA: install-knop ---
let installPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  installPrompt = e;
  document.getElementById("installKnop").style.display = "block";
});
function installeerApp(){
  if(!installPrompt) return;
  installPrompt.prompt();
  installPrompt.userChoice.then(()=>{
    installPrompt = null;
    document.getElementById("installKnop").style.display = "none";
  });
}
// Als de app al geïnstalleerd draait, knop verbergen
window.addEventListener("appinstalled", () => {
  document.getElementById("installKnop").style.display = "none";
});
</script>
</body>
</html>
